mainSections   = ["post"]
rssFullContent = true
favicon        = "img/avatar.jpg"

[footer]
since = 2015

[sidebar]
emoji    = "🥲"
subtitle = "分享经验, 共同进步."
avatar   = "img/avatar.jpg"
compact = false

[widgets]
homepage = [
    { type = "search" },
    { type = "archives", params = { limit = 5 } },
    { type = "categories", params = { limit = 10 } },
    { type = "tag-cloud", params = { limit = 10 } },
]
page = [
    { type = "toc" },
]

[article]
[article.list]
# Showing article tags in the list view (e.g. homepage, section pages)
showTags = true

[comments]
enabled  = true
provider = "giscus"

[comments.giscus]
repo             = "skytoup/blog"
repoID           = "R_kgDOR6BeaA"
category         = ""
categoryID       = ""
mapping          = "title"
lightTheme       = "light"
darkTheme        = "dark_dimmed"
reactionsEnabled = 1
emitMetadata     = 0
inputPosition    = "top"
lang             = "zh-CN"
strict           = 0
loading          = "lazy"

# GDPR Cookie Consent Configuration
# When enabled, analytics and functional cookies require user consent
[cookies]
enabled = false

[cookies.categories]
analytics  = true
functional = true
