baseURL = 'https://blog.skytoup.com/'
locale = 'cn-zh'
title = 'Skytoup Blog'

# 更多常用配置
paginate = 15
enableRobotsTXT = true

[[module.imports]]
path = "github.com/CaiJimmy/hugo-theme-stack/v4"

[pagination]
    pagerSize = 15

[permalinks]
    post = "/p/:slug/"
    page = "/:slug/"

[outputs]
home = ['html', 'rss']
section = ['html', 'rss']
taxonomy = ['html']
term = ['html']

[privacy]
  [privacy.x]
    disable = true
    enableDNT = false
    simple = false